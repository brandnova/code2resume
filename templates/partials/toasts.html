{% if messages %}
<div
    x-data="toastManager()"
    x-init="init()"
    class="toast-container"
    aria-live="polite"
>
    <template x-for="toast in toasts" :key="toast.id">
        <div
            class="toast"
            :class="toast.type"
            x-show="toast.visible"
            x-transition:enter="toast-enter"
            x-transition:enter-start="toast-enter-start"
            x-transition:enter-end="toast-enter-end"
            x-transition:leave="toast-leave"
            x-transition:leave-start="toast-leave-start"
            x-transition:leave-end="toast-leave-end"
        >
            <i class="toast-icon" :class="toast.icon"></i>
            <span class="toast-message" x-text="toast.message"></span>
            <button @click="dismiss(toast.id)" class="toast-close" aria-label="Dismiss">
                <i class="fas fa-xmark"></i>
            </button>
            <div class="toast-progress" :style="`animation-duration: ${toast.duration}ms`"></div>
        </div>
    </template>
</div>

<script>
const __DJANGO_MESSAGES__ = [
    {% for message in messages %}
    {
        message: {{ message|tojson|safe }},
        tags:    "{{ message.tags }}",
    },
    {% endfor %}
];
</script>
{% endif %}
