<div
    x-show="showNewResumeModal"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    @click.self="cancelNewResume()"
    class="shortcuts-backdrop"
    style="display: none;"
>
    <div
        class="shortcuts-card"
        style="max-width: 420px;"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 scale-95"
        x-transition:enter-end="opacity-100 scale-100"
    >
        <div class="shortcuts-header">
            <div>
                <h2 class="shortcuts-title">Start a new resume?</h2>
                <p class="shortcuts-subtitle">Your current workspace will be cleared.</p>
            </div>
        </div>

        <div class="shortcuts-body" style="gap: 10px;">
            <p class="text-sm" style="color: var(--text-secondary); line-height: 1.6;">
                Any unsaved changes in the editor will be permanently lost.
                Make sure you've saved your work to your profile before continuing.
            </p>
        </div>

        <div class="shortcuts-footer" style="display: flex; gap: 8px; justify-content: flex-end; padding: 16px 24px;">
            <button @click="cancelNewResume()" class="btn btn-ghost">
                Cancel
            </button>
            <button @click="executeNewResume()" class="btn btn-primary"
                    style="background: var(--danger); border-color: var(--danger);">
                <i class="fa-solid fa-trash-can"></i>
                Discard &amp; start new
            </button>
        </div>
    </div>
</div>
